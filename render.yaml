services:
  - type: web
    name: yourshop
    runtime: python
    region: singapore        # closest to India
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()" --workers=2 --timeout=120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true       # Render auto-generates a secure random value
      - key: DATABASE_URL
        fromDatabase:
          name: yourshop-db
          property: connectionString

databases:
  - name: yourshop-db
    databaseName: yourshop
    plan: free
    region: singapore
