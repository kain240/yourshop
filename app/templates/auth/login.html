<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — YourShop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>

<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-icon-lg">🛒</div>
                <h1>YourShop</h1>
                <p>Retail Management System</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="admin@yourshop.com" required
                        autofocus />
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required />
                </div>
                {% if branches %}
                <div class="form-group">
                    <label class="form-label">Select Branch</label>
                    <select name="branch_id" class="form-control">
                        <option value="">-- Select Branch --</option>
                        {% for branch in branches %}
                        <option value="{{ branch.id }}">{{ branch.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                {% endif %}
                <div class="form-group">
                    <label class="form-check">
                        <input type="checkbox" name="remember" /> Remember me
                    </label>
                </div>
                <button type="submit" class="btn btn-primary w-full btn-lg" style="justify-content: center">
                    Sign In →
                </button>
            </form>
        </div>
    </div>
</body>

</html>
